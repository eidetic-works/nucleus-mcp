<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intern Who Acts Demo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 15px;
            line-height: 1.5;
            overflow: hidden;
        }

        #terminal {
            padding: 20px;
            height: 100vh;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .user {
            color: #58a6ff;
            font-weight: bold;
        }

        .ai {
            color: #3fb950;
            font-weight: bold;
        }

        .tool {
            color: #d2a8ff;
        }

        .nucleus {
            color: #ff7b72;
            font-weight: bold;
        }

        .dim {
            color: #8b949e;
        }

        .typing-cursor::after {
            content: '█';
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div id="terminal"></div>
    <script>
        const lines = [
            { text: "USER: Hey Nucleus, we need to launch the 'Agent Governance' campaign. Spin up the intern.", class: "user", delay: 1000 },
            { text: "ASSISTANT: Understood. Initializing Sovereign Control Plane and orchestrating the campaign...", class: "ai", delay: 1500 },
            { text: " ", delay: 500 },
            { text: "⚙️ Calling tool: brain_session_start", class: "tool", delay: 800 },
            { text: "[NUCLEUS] Session ID: sess_8f9a2b11", class: "nucleus", delay: 500 },
            { text: "[NUCLEUS] Security Tier: TITAN (Sovereign Context)", class: "dim", delay: 300 },
            { text: "[NUCLEUS] Hook engine active. Event logging enabled.", class: "dim", delay: 300 },
            { text: " ", delay: 500 },
            { text: "⚙️ Calling tool: brain_morning_brief", class: "tool", delay: 1200 },
            { text: "[NUCLEUS] Generating Sovereign Morning Brief...", class: "nucleus", delay: 1000 },
            { text: "=========================================", class: "dim", delay: 100 },
            { text: "🌞 MASTER BRIEF | 2026-02-22", class: "dim", delay: 100 },
            { text: "=========================================", class: "dim", delay: 100 },
            { text: "1. 🧠 ENGRAMS: 102 Active Memories (Sovereign)", class: "dim", delay: 200 },
            { text: "2. ☄️ OUTREACH: 6 Batch C Strikes (2 Live, 4 Skipped)", class: "dim", delay: 200 },
            { text: "3. 🪝 HOOK HEALTH: 182 Audit Events Logged", class: "dim", delay: 200 },
            { text: "=========================================", class: "dim", delay: 100 },
            { text: " ", delay: 1000 },
            { text: "⚙️ Calling tool: brain_add_task", class: "tool", delay: 1000 },
            { text: "   args: { \"description\": \"Launch Agent Governance Campaign on Twitter and Hacker News\", \"priority\": 1 }", class: "dim", delay: 500 },
            { text: "[NUCLEUS] Task written to Sovereign Ledger: task-182b62fd", class: "nucleus", delay: 800 },
            { text: " ", delay: 800 },
            { text: "ASSISTANT: Task registered. Now delegating the workload to our agent pool...", class: "ai", delay: 1200 },
            { text: " ", delay: 500 },
            { text: "⚙️ Calling tool: brain_orchestrate", class: "tool", delay: 1000 },
            { text: "   args: { \"task_id\": \"task-182b62fd\" }", class: "dim", delay: 400 },
            { text: "[NUCLEUS] 🚀 Initiating God Command...", class: "nucleus", delay: 1000 },
            { text: "[NUCLEUS] Scanning active agents...", class: "dim", delay: 800 },
            { text: "[NUCLEUS] -> Assigned 'Researcher' (Tier 1) for competitive analysis.", class: "dim", delay: 1200 },
            { text: "[NUCLEUS] -> Assigned 'Copywriter' (Tier 1) for Twitter thread drafting.", class: "dim", delay: 1500 },
            { text: "[NUCLEUS] Gathering proofs...", class: "dim", delay: 2000 },
            { text: "[NUCLEUS] Trust Trail validated. Crypto-signatures verified.", class: "dim", delay: 800 },
            { text: "[NUCLEUS] Task task-182b62fd marked as PENDING_APPROVAL.", class: "nucleus", delay: 600 },
            { text: " ", delay: 1000 },
            { text: "ASSISTANT: The intern swarm has completed the draft campaign. Preparing to deploy.", class: "ai", delay: 1500 },
            { text: " ", delay: 500 },
            { text: "⚙️ Calling tool: run_command", class: "tool", delay: 800 },
            { text: "   args: { \"command\": \"./deploy_campaign.sh --target twitter\" }", class: "dim", delay: 600 },
            { text: "[Terminal] Authenticating with Sovereign Vault...", class: "dim", delay: 1000 },
            { text: "[Terminal] Deploying thread: 'Why Agent Governance is the future...'", class: "dim", delay: 1200 },
            { text: "[Terminal] ✅ Campaign successfully deployed.", class: "dim", delay: 800 },
            { text: " ", delay: 800 },
            { text: "⚙️ Calling tool: mcp_nucleus_brain_audit_log", class: "tool", delay: 1000 },
            { text: "   args: { \"limit\": 5 }", class: "dim", delay: 400 },
            { text: "[NUCLEUS] Tamper-Proof Audit Log (Last 5 actions):", class: "nucleus", delay: 600 },
            { text: "| Timestamp | Agent       | Action          | Resource                |", class: "dim", delay: 100 },
            { text: "|-----------|-------------|-----------------|-------------------------|", class: "dim", delay: 100 },
            { text: "| 06:15:02  | manual      | session_start   | hypervisor              |", class: "dim", delay: 100 },
            { text: "| 06:15:05  | manual      | add_task        | ledger/tasks.json       |", class: "dim", delay: 100 },
            { text: "| 06:15:15  | Researcher  | query_engrams   | engrams/store.json      |", class: "dim", delay: 100 },
            { text: "| 06:15:18  | Copywriter  | write_artifact  | brain/drafts/thread.md  |", class: "dim", delay: 100 },
            { text: "| 06:15:25  | manual      | deploy          | shell/deploy_campaign.sh|", class: "dim", delay: 100 },
            { text: " ", delay: 500 },
            { text: "ASSISTANT: Campaign deployed successfully. All actions have been cryptographically logged in the Sovereign Brain. The 'Intern who Acts' workflow is complete.", class: "ai", delay: 2000 },
            { text: " ", delay: 2000 }, // Hold screen at the end
        ];

        const terminal = document.getElementById('terminal');

        async function typeWriter(text, className, delay) {
            const el = document.createElement('div');
            if (className) el.className = className;
            if (text === " ") {
                el.innerHTML = "&nbsp;";
                terminal.appendChild(el);
                return new Promise(r => setTimeout(r, delay));
            }

            el.classList.add('typing-cursor');
            terminal.appendChild(el);

            // Fast typing effect
            for (let i = 0; i < text.length; i++) {
                el.textContent += text.charAt(i);
                terminal.scrollTop = terminal.scrollHeight;
                await new Promise(r => setTimeout(r, Math.random() * 20 + 5)); // 5-25ms per char
            }

            el.classList.remove('typing-cursor');
            await new Promise(r => setTimeout(r, delay));
        }

        async function runDemo() {
            await new Promise(r => setTimeout(r, 1000)); // Start delay
            for (const line of lines) {
                await typeWriter(line.text, line.class, line.delay);
            }

            // Create a completion marker div for browser_subagent to wait on
            const complete = document.createElement('div');
            complete.id = 'demo-complete';
            terminal.appendChild(complete);
        }

        runDemo();
    </script>
</body>

</html>
