# GitHub Actions workflow for nucleus-mcp (PUBLIC repo)
# This is the public-facing CI. The private repo uses ci.yml which
# contains additional pseudonymity-scan and feedback-gates jobs that
# must not be exposed publicly.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        shell: bash
        run: |
          if [ -d tests/ ]; then
            pytest tests/ -v --tb=short
          else
            echo "No tests/ directory (tests are export-ignored in public repo)."
            echo "Running CLI entry-point smoke test instead..."
            nucleus-mcp --version || python -c "from importlib.metadata import version; print(f'nucleus-mcp v{version(\"nucleus-mcp\")} installed OK')"
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run linter
        run: |
          ruff check src/

  publish:
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install hatch twine

      - name: Build package
        run: hatch build

      - name: Check if version already published
        id: check_version
        run: |
          VERSION=$(hatch version)
          if pip index versions nucleus-mcp 2>/dev/null | grep -q "$VERSION"; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to PyPI
        if: steps.check_version.outputs.skip != 'true'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$TWINE_PASSWORD" ]; then
            echo "Skipping publish: PYPI_API_TOKEN is not set."
            exit 0
          fi
          twine upload dist/*
